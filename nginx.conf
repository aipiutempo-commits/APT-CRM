# ─── Nginx – Configurazione CRM Personale ────────────────────────────────────
# Posiziona in: /etc/nginx/sites-available/crm
# Abilita con:  ln -s /etc/nginx/sites-available/crm /etc/nginx/sites-enabled/
# Ricarica con: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name TUO_DOMINIO_O_IP;

    # Redirect a HTTPS (decommenta dopo aver configurato certbot)
    # return 301 https://$host$request_uri;

    # ── Proxy verso FastAPI (Uvicorn) ──────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ── Service Worker deve avere scope root ───────────────────────────────
    location = /sw.js {
        proxy_pass http://127.0.0.1:8000/sw.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # ── Cache aggressiva per asset statici ─────────────────────────────────
    location /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}

